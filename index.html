<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dr. Abraxis – Fortune Ticket</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-atmosphere"></div>
    <main class="ticket-stage">
        <div class="ticket" id="fortuneTicket">
            <div class="ticket-perforation-top"></div>
            <div class="ticket-content">
                <div class="ticket-header">
                    <span class="star-icon">✦</span>
                    <h1>D R . &nbsp; A B R A X I S</h1>
                    <span class="star-icon">✦</span>
                </div>
                <div class="ticket-subtitle">SEER OF FATES</div>
                <div class="fortune-wrapper">
                    <div class="fortune-text" id="fortuneText">
                        <!-- fortune appears here -->
                    </div>
                </div>
                <!-- LUCKY NUMBERS SECTION -->
                <div class="lucky-numbers-container">
                    <div class="lucky-label">✦ LUCKY NUMBERS ✦</div>
                    <div class="numbers-grid" id="luckyNumbersGrid">
                        <span class="number-ball">--</span>
                        <span class="number-ball">--</span>
                        <span class="number-ball">--</span>
                        <span class="number-ball">--</span>
                        <span class="number-ball">--</span>
                        <span class="number-ball">--</span>
                    </div>
                </div>
                <div class="ticket-footer">
                    <div class="serial">№  •  FORTUNE SLIP  •  №</div>
                </div>
            </div>
            <div class="ticket-perforation-bottom"></div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
